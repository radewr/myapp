<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HexMapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0b0d0a; --surface:#121410; --border:#252820; --border2:#303428;
  --accent:#c8a84a; --accent2:#7aaa5a; --text:#cec9ba; --muted:#605e50; --danger:#b04040;
}
html,body {
  height:100%; height:100dvh; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:'JetBrains Mono',monospace;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
body { display:flex; flex-direction:column; }

/* ── MENUBAR ── */
#menubar {
  display:flex; align-items:center; gap:3px;
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 12px; height:44px; flex-shrink:0;
  user-select:none; position:relative; z-index:10;
}
#logo {
  font-family:'IM Fell English',serif; font-size:17px; color:var(--accent);
  letter-spacing:.04em; padding-right:11px; border-right:1px solid var(--border2);
  margin-right:3px; flex-shrink:0;
}
#mapNameInput {
  background:none; border:none; border-bottom:1px solid transparent;
  color:var(--accent); font-family:'IM Fell English',serif; font-style:italic;
  font-size:13px; width:130px; outline:none; padding:2px 4px; min-width:0;
  transition:border-color .2s;
}
#mapNameInput:hover,#mapNameInput:focus { border-bottom-color:var(--accent); }
.bsep { width:1px; height:18px; background:var(--border2); margin:0 2px; flex-shrink:0; }
.mbtn {
  display:flex; align-items:center; gap:3px; background:none; border:none;
  color:var(--text); font-family:'JetBrains Mono',monospace; font-size:10.5px;
  padding:0 9px; height:32px; min-width:32px; cursor:pointer; border-radius:4px;
  transition:background .12s,color .12s; white-space:nowrap; flex-shrink:0; letter-spacing:.03em;
}
.mbtn:hover  { background:var(--border); color:var(--accent); }
.mbtn:active { background:#252c18; }
.mbtn.danger { color:var(--danger); }
.mbtn.danger:hover { background:#281010; }
.mbtn:disabled { opacity:.28; pointer-events:none; }
.blab {}
#spacer { flex:1; }
#kbdHint { font-size:9px; color:var(--muted); letter-spacing:.02em; flex-shrink:0; }
#hamburger { display:none; font-size:18px; padding:0 8px; }

/* ── MOBILE DROPDOWN ── */
#mobileMenu {
  display:none; position:fixed; top:44px; left:0; right:0;
  background:var(--surface); border-bottom:1px solid var(--border2);
  z-index:90; padding:6px 8px; flex-direction:column; gap:2px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}
#mobileMenu.open { display:flex; }
#mobileMenu .mbtn { width:100%; height:44px; padding:0 14px; font-size:13px; justify-content:flex-start; border-radius:5px; }
.mmsep { height:1px; background:var(--border); margin:3px 6px; }

/* ── MAIN ── */
#main { display:flex; flex:1; overflow:hidden; }

/* ── MAP ── */
#mapArea { flex:1; position:relative; overflow:hidden; background:#080a07; }
#mapSvg {
  position:absolute; inset:0; width:100%; height:100%;
  touch-action:none; user-select:none; -webkit-user-select:none;
}
/* Hex CSS hover (desktop only) */
.hd,.hf { cursor:pointer; }
.hd .hov,.hf .hov { pointer-events:none; fill:white; opacity:0; transition:opacity .1s; }
@media (hover:hover) {
  .hd:hover .hov { opacity:.06; }
  .hf:hover .hov { opacity:.05; }
  .hf:hover polygon:first-child { stroke:#3a4828 !important; }
}
#mapHint {
  position:absolute; bottom:10px; left:12px; font-size:9px;
  color:var(--muted); pointer-events:none; line-height:1.8;
}

/* ── INSPECTOR (desktop side panel) ── */
#inspector {
  width:268px; background:var(--surface); border-left:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
}
#sheetHandle  { display:none; }
#closeSheetBtn { display:none; }
#inspHead {
  display:flex; align-items:center; gap:6px;
  padding:11px 15px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
#inspTitle  { font-family:'IM Fell English',serif; font-size:13px; color:var(--accent); flex-shrink:0; }
#inspCoords { font-size:9px; color:var(--muted); letter-spacing:.06em; flex:1; }
#closeSheetBtn {
  background:none; border:none; color:var(--muted); font-size:15px;
  cursor:pointer; padding:2px 5px; line-height:1; border-radius:3px; flex-shrink:0;
}
#closeSheetBtn:hover { color:var(--text); background:var(--border); }
#inspBody {
  flex:1; overflow-y:auto; padding:13px 15px;
  display:flex; flex-direction:column; gap:13px;
}
#inspEmpty {
  color:var(--muted); font-family:'IM Fell English',serif; font-style:italic;
  font-size:12.5px; text-align:center; margin-top:40px; line-height:1.85;
}
.flabel { display:block; font-size:8.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:5px; }
.finput {
  width:100%; background:#0a0c09; border:1px solid var(--border2); color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 9px;
  border-radius:3px; outline:none; transition:border-color .18s; -webkit-appearance:none;
}
.finput:focus { border-color:var(--accent); }
.finput::placeholder { color:var(--muted); }
textarea.finput { resize:vertical; min-height:70px; line-height:1.55; }
#terrainGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.tswatch {
  border:2px solid transparent; border-radius:3px; padding:5px 3px 4px;
  cursor:pointer; text-align:center; display:flex; flex-direction:column;
  align-items:center; gap:2px; transition:transform .1s,border-color .15s;
}
.tswatch:hover { transform:scale(1.06); }
.tswatch.active { border-color:var(--accent) !important; }
.tsym { font-size:15px; line-height:1; }
.tlbl { font-size:7.5px; text-transform:uppercase; letter-spacing:.05em; }
#dangerRow { display:flex; gap:4px; }
.dbtn {
  flex:1; padding:6px 4px; border-radius:3px; border:1px solid var(--border2);
  background:none; color:var(--muted); font-family:'JetBrains Mono',monospace;
  font-size:9.5px; cursor:pointer; transition:all .15s; letter-spacing:.03em; min-height:34px;
}
.dbtn:hover { border-color:var(--border); color:var(--text); }
.dbtn.a0 { background:#1a3a1a; border-color:#3a6a3a; color:#7aca7a; }
.dbtn.a1 { background:#3a2e08; border-color:#7a5e18; color:#c89840; }
.dbtn.a2 { background:#3a1010; border-color:#7a2828; color:#c45050; }
.sep { height:1px; background:var(--border); margin:1px 0; }
#deleteBtn {
  width:100%; padding:8px; border:1px solid #301010; border-radius:3px;
  background:none; color:var(--danger); font-family:'JetBrains Mono',monospace;
  font-size:10.5px; cursor:pointer; transition:background .15s; letter-spacing:.03em; min-height:36px;
}
#deleteBtn:hover { background:#1e0a0a; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── MODAL ── */
#overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.72);
  z-index:200; align-items:center; justify-content:center; padding:20px;
}
#overlay.show { display:flex; }
#modal {
  background:var(--surface); border:1px solid var(--border2); border-radius:6px;
  padding:22px 22px 18px; width:100%; max-width:310px;
  display:flex; flex-direction:column; gap:15px;
}
#modalTitle { font-family:'IM Fell English',serif; font-size:15px; color:var(--accent); }
#modalBody  { display:flex; flex-direction:column; gap:10px; }
#modalActs  { display:flex; gap:7px; justify-content:flex-end; }
.abtn {
  padding:8px 16px; border-radius:3px; font-family:'JetBrains Mono',monospace;
  font-size:11px; cursor:pointer; transition:all .14s; min-height:38px;
}
.abtn.primary   { background:#1e3010; border:1px solid var(--accent2); color:var(--accent2); }
.abtn.primary:hover { background:#2a4018; }
.abtn.secondary { background:none; border:1px solid var(--border2); color:var(--muted); }
.abtn.secondary:hover { background:var(--border); color:var(--text); }

/* ── FLASH ── */
#flash {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  background:#1a2e0e; border:1px solid #385820; color:#90b870;
  font-family:'JetBrains Mono',monospace; font-size:10.5px;
  padding:8px 18px; border-radius:3px; z-index:300;
  transition:opacity .4s; pointer-events:none; opacity:0; white-space:nowrap;
}

/* ── MOBILE ── */
@media (max-width:720px) {
  #desktopBtns,#desktopSep,#kbdHint,#clearBtn { display:none !important; }
  #hamburger { display:flex; }
  #mapNameInput { width:100px; font-size:12px; }
  .blab { display:none; }

  /* Bottom sheet */
  #inspector {
    position:fixed; bottom:0; left:0; right:0; width:auto;
    height:58vh; min-height:300px;
    border-left:none; border-top:1px solid var(--border2);
    border-radius:14px 14px 0 0;
    box-shadow:0 -12px 40px rgba(0,0,0,.7);
    transform:translateY(calc(100% + 4px));
    transition:transform .32s cubic-bezier(.4,0,.2,1);
    z-index:50;
  }
  #inspector.open { transform:translateY(0); }

  #sheetHandle {
    display:flex; justify-content:center; align-items:flex-start;
    padding:10px 0 2px; flex-shrink:0; touch-action:none; cursor:grab;
  }
  #sheetHandle::before {
    content:''; width:40px; height:4px; background:var(--border2); border-radius:2px;
  }
  #closeSheetBtn { display:block; }
  #inspHead { padding-top:8px; }

  /* Larger touch targets */
  .finput    { padding:9px 10px; font-size:13px; }
  .dbtn      { min-height:40px; font-size:10px; }
  #deleteBtn { padding:11px; min-height:44px; font-size:11.5px; }
  .tswatch   { padding:7px 4px 6px; }
  .tsym      { font-size:18px; }
  .tlbl      { font-size:8.5px; }
  .mbtn      { height:38px; }
  #flash     { bottom:12px; }
  #mapHint   { display:none; }
}
</style>
</head>
<body>

<div id="menubar">
  <span id="logo">HexMapper</span>
  <input id="mapNameInput" type="text" value="Untitled Map" spellcheck="false">
  <div class="bsep"></div>
  <div id="desktopBtns" style="display:flex;align-items:center;gap:2px;">
    <button class="mbtn" onclick="newMap()">⊕<span class="blab"> New</span></button>
    <button class="mbtn" onclick="saveMap()">⤓<span class="blab"> Save</span></button>
    <button class="mbtn" onclick="openLoad()">⤒<span class="blab"> Load</span></button>
    <button class="mbtn" onclick="exportMap()">↗<span class="blab"> Export</span></button>
  </div>
  <div class="bsep" id="desktopSep"></div>
  <button class="mbtn" id="undoBtn" onclick="undo()" disabled>↩<span class="blab"> Undo</span></button>
  <button class="mbtn" id="redoBtn" onclick="redo()" disabled>↪<span class="blab"> Redo</span></button>
  <div id="spacer"></div>
  <span id="kbdHint">Ctrl+Z undo · Ctrl+S save · Del remove · scroll zoom</span>
  <div class="bsep"></div>
  <button class="mbtn danger" id="clearBtn" onclick="clearAll()">⊘<span class="blab"> Clear</span></button>
  <button class="mbtn" id="hamburger" onclick="toggleMenu()">☰</button>
</div>

<div id="mobileMenu">
  <button class="mbtn" onclick="newMap();closeMenu()">⊕  New Map</button>
  <button class="mbtn" onclick="saveMap();closeMenu()">⤓  Save</button>
  <button class="mbtn" onclick="openLoad();closeMenu()">⤒  Load</button>
  <button class="mbtn" onclick="exportMap();closeMenu()">↗  Export JSON</button>
  <div class="mmsep"></div>
  <button class="mbtn danger" onclick="clearAll();closeMenu()">⊘  Clear All</button>
</div>

<div id="main">
  <div id="mapArea">
    <svg id="mapSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
          <circle cx="14" cy="14" r=".6" fill="#1e2218" opacity=".8"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots)"/>
      <g id="mapGroup"></g>
    </svg>
    <div id="mapHint">Tap frontier to discover · Tap hex to inspect · Drag to pan · Scroll to zoom</div>
  </div>

  <div id="inspector">
    <div id="sheetHandle"></div>
    <div id="inspHead">
      <span id="inspTitle">Inspector</span>
      <span id="inspCoords">—</span>
      <button id="closeSheetBtn" onclick="dismissSheet()" title="Close">✕</button>
    </div>
    <div id="inspBody">
      <div id="inspEmpty">Select a hex to inspect,<br>or tap a frontier hex<br>to discover it.</div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalActs"></div>
  </div>
</div>
<div id="flash"></div>

<script>
// ═══════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════
const SZ=52, S3=Math.sqrt(3);
const DIRS=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];
const T={
  plains:    {n:'Plains',    c:'#303e1e',s:'#4a6030',sym:'⊙',tc:'#96bc74'},
  forest:    {n:'Forest',    c:'#162812',s:'#284a20',sym:'♣',tc:'#58a048'},
  mountains: {n:'Mountains', c:'#302820',s:'#504030',sym:'▲',tc:'#a89070'},
  desert:    {n:'Desert',    c:'#4a3610',s:'#7a5e20',sym:'◇',tc:'#d4a848'},
  ocean:     {n:'Ocean',     c:'#0e1c38',s:'#1a3260',sym:'≈',tc:'#4888cc'},
  swamp:     {n:'Swamp',     c:'#1a2a0e',s:'#304020',sym:'✦',tc:'#607840'},
  tundra:    {n:'Tundra',    c:'#202e3a',s:'#304858',sym:'❄',tc:'#78aac4'},
  ruins:     {n:'Ruins',     c:'#261a14',s:'#403028',sym:'⌖',tc:'#9a7860'},
  settlement:{n:'Settlement',c:'#362010',s:'#5e3818',sym:'⌂',tc:'#cc8838'},
};

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let hexes={}, sel=null, hist=[], fut=[];
let panX=0, panY=0, zoom=1;

// ═══════════════════════════════════
// HEX MATH
// ═══════════════════════════════════
const hk=(q,r)=>`${q},${r}`;
const nb=(q,r)=>DIRS.map(([a,b])=>[q+a,r+b]);
const a2p=(q,r)=>({x:SZ*(S3*q+S3/2*r), y:SZ*(1.5*r)});

function hexPts(cx,cy){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/3*i-Math.PI/6;
    return `${(cx+SZ*Math.cos(a)).toFixed(2)},${(cy+SZ*Math.sin(a)).toFixed(2)}`;
  }).join(' ');
}

function hexAt(sx,sy){
  const qf=(S3/3*sx-1/3*sy)/SZ, rf=2/3*sy/SZ, sf=-qf-rf;
  let q=Math.round(qf),r=Math.round(rf),s=Math.round(sf);
  const dq=Math.abs(q-qf),dr=Math.abs(r-rf),ds=Math.abs(s-sf);
  if(dq>dr&&dq>ds) q=-r-s; else if(dr>ds) r=-q-s;
  return hexes[hk(q,r)]||null;
}

function applyXform(){
  document.getElementById('mapGroup')
    .setAttribute('transform',`translate(${panX},${panY}) scale(${zoom})`);
}

function centerMap(){
  const a=document.getElementById('mapArea');
  panX=a.clientWidth/2; panY=a.clientHeight/2;
  zoom=window.innerWidth<=720?0.88:1;
  applyXform();
}

// ═══════════════════════════════════
// HISTORY
// ═══════════════════════════════════
const snap=()=>JSON.stringify(hexes);

function pushH(){
  hist.push(snap()); if(hist.length>120)hist.shift();
  fut=[]; syncHBtns();
}

function undo(){
  if(!hist.length)return;
  fut.push(snap()); hexes=JSON.parse(hist.pop());
  syncHBtns(); syncSel(); render();
}

function redo(){
  if(!fut.length)return;
  hist.push(snap()); hexes=JSON.parse(fut.pop());
  syncHBtns(); syncSel(); render();
}

function syncHBtns(){
  document.getElementById('undoBtn').disabled=!hist.length;
  document.getElementById('redoBtn').disabled=!fut.length;
}

function syncSel(){
  if(sel&&!hexes[sel]){sel=null;closeSheet();}
  updatePanel();
}

// ═══════════════════════════════════
// HEX FACTORY
// ═══════════════════════════════════
function mkHex(q,r,disc){
  return{q,r,disc,
    name:disc?(q===0&&r===0?'Origin':`Hex ${q},${r}`):'',
    terrain:'plains',desc:'',tags:'',danger:0};
}

// ═══════════════════════════════════
// ACTIONS
// ═══════════════════════════════════
function newMap(){
  showModal('New Map',
    `<label class="flabel">Map Name</label>
     <input class="finput" id="mnN" value="${esc(document.getElementById('mapNameInput').value)}" autocomplete="off">
     <div style="font-size:9.5px;color:var(--muted);margin-top:2px;">Current map will be cleared.</div>`,
    [{lbl:'Create',cls:'primary',fn:()=>{
      const nm=document.getElementById('mnN').value.trim()||'Untitled Map';
      document.getElementById('mapNameInput').value=nm;
      hist=[];fut=[];hexes={};sel=null;
      hexes[hk(0,0)]=mkHex(0,0,true);
      nb(0,0).forEach(([q,r])=>{hexes[hk(q,r)]=mkHex(q,r,false);});
      syncHBtns();closeSheet();centerMap();render();updatePanel();
    }},{lbl:'Cancel',cls:'secondary',fn:null}]);
  setTimeout(()=>{const e=document.getElementById('mnN');if(e){e.focus();e.select();}},60);
}

function discover(q,r){
  const k=hk(q,r); if(!hexes[k])return;
  pushH();
  hexes[k].disc=true; hexes[k].name=`Hex ${q},${r}`;
  nb(q,r).forEach(([a,b])=>{const nk=hk(a,b);if(!hexes[nk])hexes[nk]=mkHex(a,b,false);});
  sel=k; render(); updatePanel(); openSheet();
}

function delSel(){
  if(!sel||!hexes[sel])return;
  if(Object.values(hexes).filter(h=>h.disc).length<=1){flash('Cannot remove last hex.');return;}
  pushH();
  delete hexes[sel];
  Object.keys(hexes).forEach(k=>{
    const h=hexes[k];
    if(!h.disc&&!nb(h.q,h.r).some(([a,b])=>hexes[hk(a,b)]?.disc))delete hexes[k];
  });
  Object.values(hexes).filter(h=>h.disc).forEach(h=>{
    nb(h.q,h.r).forEach(([a,b])=>{const nk=hk(a,b);if(!hexes[nk])hexes[nk]=mkHex(a,b,false);});
  });
  sel=null; render(); closeSheet(); updatePanel();
}

function saveMap(){
  const name=document.getElementById('mapNameInput').value.trim()||'Untitled Map';
  const saves=JSON.parse(localStorage.getItem('hxm')||'{}');
  saves[name]={hexes,name,ts:Date.now()};
  localStorage.setItem('hxm',JSON.stringify(saves));
  flash('Saved: '+name);
}

function openLoad(){
  const saves=JSON.parse(localStorage.getItem('hxm')||'{}');
  const keys=Object.keys(saves);
  if(!keys.length){flash('No saved maps.');return;}
  const rows=keys.map(n=>{
    const d=saves[n].ts?new Date(saves[n].ts).toLocaleDateString():'';
    const cnt=saves[n].hexes?Object.values(saves[n].hexes).filter(h=>h.disc).length:'?';
    return`<div style="display:flex;align-items:center;justify-content:space-between;
      padding:9px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;
      font-size:11px;gap:8px;transition:background .1s"
      onclick="loadSave('${esc(n)}')"
      onmouseover="this.style.background='#1a1e14'" onmouseout="this.style.background='none'">
      <span style="color:var(--text)">${esc(n)}</span>
      <span style="color:var(--muted);font-size:9px;white-space:nowrap">${cnt} hexes · ${d}</span>
    </div>`;
  }).join('');
  showModal('Load Map',
    `<div style="display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto">${rows}</div>`,
    [{lbl:'Cancel',cls:'secondary',fn:null}]);
}

function loadSave(name){
  const saves=JSON.parse(localStorage.getItem('hxm')||'{}');
  if(!saves[name])return;
  pushH(); hexes=saves[name].hexes; sel=null;
  document.getElementById('mapNameInput').value=name;
  hideModal(); closeSheet(); render(); updatePanel();
  flash('Loaded: '+name);
}

function exportMap(){
  const name=document.getElementById('mapNameInput').value.trim()||'hexmap';
  const blob=new Blob([JSON.stringify({name,hexes},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  Object.assign(document.createElement('a'),{href:url,download:`${name.replace(/\s+/g,'_')}.json`}).click();
  URL.revokeObjectURL(url);
}

function clearAll(){
  if(!confirm('Clear all hexes?'))return;
  hist=[];fut=[];hexes={};sel=null;
  syncHBtns();closeSheet();render();updatePanel();
}

// ═══════════════════════════════════
// INSPECTOR
// ═══════════════════════════════════
function updatePanel(){
  const body=document.getElementById('inspBody');
  const coords=document.getElementById('inspCoords');
  if(!sel||!hexes[sel]){
    body.innerHTML='<div id="inspEmpty">Select a hex to inspect,<br>or tap a frontier hex<br>to discover it.</div>';
    coords.textContent='—'; return;
  }
  const h=hexes[sel];
  coords.textContent=`q:${h.q} r:${h.r}`;
  const sw=Object.entries(T).map(([k,t])=>
    `<div class="tswatch ${h.terrain===k?'active':''}"
      style="background:${t.c};border-color:${h.terrain===k?'var(--accent)':t.s+'80'}"
      onclick="setT('${k}')" title="${t.n}">
      <span class="tsym">${t.sym}</span>
      <span class="tlbl" style="color:${t.tc}">${t.n}</span>
    </div>`).join('');
  const db=['Safe','Risky','Deadly'].map((l,i)=>
    `<button class="dbtn ${h.danger===i?'a'+i:''}" onclick="setD(${i})">${l}</button>`).join('');
  body.innerHTML=`
    <div><label class="flabel">Name</label>
      <input class="finput" value="${esc(h.name)}" placeholder="Location name…"
        oninput="lf('name',this.value)" inputmode="text"></div>
    <div><label class="flabel">Terrain</label>
      <div id="terrainGrid">${sw}</div></div>
    <div class="sep"></div>
    <div><label class="flabel">Description</label>
      <textarea class="finput" placeholder="Describe what the party finds here…"
        oninput="lf('desc',this.value)" inputmode="text">${esc(h.desc)}</textarea></div>
    <div><label class="flabel">Tags / Features</label>
      <input class="finput" value="${esc(h.tags)}"
        placeholder="river, ruins, merchant…" oninput="lf('tags',this.value)" inputmode="text"></div>
    <div><label class="flabel">Danger Level</label>
      <div id="dangerRow">${db}</div></div>
    <div class="sep"></div>
    <button id="deleteBtn" onclick="delSel()">⊗ Remove This Hex</button>`;
}

function lf(field,val){
  if(!sel||!hexes[sel])return;
  hexes[sel][field]=val;
  if(field==='name'){clearTimeout(lf._t);lf._t=setTimeout(render,350);}
}

function setT(key){if(!sel||!hexes[sel])return;pushH();hexes[sel].terrain=key;render();updatePanel();}
function setD(lvl){if(!sel||!hexes[sel])return;pushH();hexes[sel].danger=lvl;render();updatePanel();}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render(){
  const g=document.getElementById('mapGroup');g.innerHTML='';
  Object.values(hexes)
    .sort((a,b)=>a.disc===b.disc?0:a.disc?1:-1)
    .forEach(h=>renderHex(g,h));
}

function renderHex(g,h){
  const{q,r,disc}=h;
  const{x,y}=a2p(q,r);
  const k=hk(q,r),isSel=sel===k;
  const t=T[h.terrain]||T.plains;
  const p=hexPts(x,y);
  const gr=se('g');

  if(disc){
    gr.classList.add('hd');
    const poly=se('polygon',{points:p,fill:t.c,
      stroke:isSel?'#c8a84a':t.s,'stroke-width':isSel?'2.5':'1'});
    if(isSel)poly.setAttribute('filter','url(#glow)');
    gr.appendChild(poly);
    gr.appendChild(se('polygon',{points:p,class:'hov'}));
    const sym=se('text',{x,y:y+1,'text-anchor':'middle','dominant-baseline':'middle',
      fill:t.tc,'font-size':'20',opacity:'.5'});
    sym.textContent=t.sym; gr.appendChild(sym);
    if(h.name){
      const lbl=se('text',{x,y:y+SZ*.6,'text-anchor':'middle',fill:t.tc,
        'font-size':'7.5','font-family':'JetBrains Mono,monospace',opacity:'.8'});
      lbl.textContent=h.name.length>11?h.name.slice(0,10)+'…':h.name;
      gr.appendChild(lbl);
    }
    if(h.danger>0){
      const dc=['#6aca6a','#d4a840','#d46060'][h.danger];
      for(let i=0;i<h.danger;i++)
        gr.appendChild(se('circle',{cx:x+(i-(h.danger-1)/2)*7,cy:y-SZ*.63,r:'2.8',fill:dc}));
    }
  }else{
    gr.classList.add('hf');
    gr.appendChild(se('polygon',{points:p,fill:'#0a0c09',stroke:'#222618',
      'stroke-width':'1','stroke-dasharray':'4 3'}));
    gr.appendChild(se('polygon',{points:p,class:'hov'}));
    const qm=se('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle',
      fill:'#252a1e','font-size':'16'});
    qm.textContent='?'; gr.appendChild(qm);
  }
  g.appendChild(gr);
}

function se(tag,attrs={}){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}

// ═══════════════════════════════════
// POINTER EVENTS — unified mouse + touch
// ═══════════════════════════════════
const mapSvg=document.getElementById('mapSvg');
const ptrs=new Map();
let moved=false, lastD=null;

mapSvg.addEventListener('pointerdown',e=>{
  closeMenu();
  ptrs.set(e.pointerId,{x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY});
  mapSvg.setPointerCapture(e.pointerId);
  if(ptrs.size===1){moved=false;}
  if(ptrs.size>=2){
    const[a,b]=[...ptrs.values()];
    lastD=Math.hypot(a.x-b.x,a.y-b.y);
    moved=true;
  }
});

mapSvg.addEventListener('pointermove',e=>{
  if(!ptrs.has(e.pointerId))return;
  const prev=ptrs.get(e.pointerId);
  ptrs.set(e.pointerId,{...prev,x:e.clientX,y:e.clientY});

  if(ptrs.size===1){
    const p=ptrs.get(e.pointerId);
    if(!moved&&Math.hypot(p.x-p.x0,p.y-p.y0)>9)moved=true;
    if(moved){panX+=e.clientX-prev.x;panY+=e.clientY-prev.y;applyXform();}
  }else if(ptrs.size>=2){
    const[a,b]=[...ptrs.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(lastD){
      const ratio=d/lastD;
      const nz=Math.max(.2,Math.min(6,zoom*ratio));
      const rect=mapSvg.getBoundingClientRect();
      const mx=(a.x+b.x)/2-rect.left, my=(a.y+b.y)/2-rect.top;
      panX=mx-(mx-panX)*nz/zoom;
      panY=my-(my-panY)*nz/zoom;
      zoom=nz; applyXform();
    }
    lastD=d;
  }
});

mapSvg.addEventListener('pointerup',e=>{
  const ptr=ptrs.get(e.pointerId);
  ptrs.delete(e.pointerId);
  if(ptrs.size<2)lastD=null;
  if(ptrs.size===0&&!moved&&ptr){
    const rect=mapSvg.getBoundingClientRect();
    handleTap(
      (ptr.x0-rect.left-panX)/zoom,
      (ptr.y0-rect.top -panY)/zoom
    );
  }
  if(ptrs.size===0)moved=false;
});

mapSvg.addEventListener('pointercancel',e=>{
  ptrs.delete(e.pointerId);
  if(ptrs.size<2)lastD=null;
  if(ptrs.size===0)moved=false;
});

// Scroll-wheel zoom (desktop)
mapSvg.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.12:.9;
  const nz=Math.max(.2,Math.min(6,zoom*f));
  const rect=mapSvg.getBoundingClientRect();
  const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
  panX=cx-(cx-panX)*nz/zoom; panY=cy-(cy-panY)*nz/zoom;
  zoom=nz; applyXform();
},{passive:false});

mapSvg.addEventListener('contextmenu',e=>e.preventDefault());

function handleTap(sx,sy){
  const hex=hexAt(sx,sy);
  if(!hex){sel=null;render();updatePanel();closeSheet();return;}
  if(!hex.disc){discover(hex.q,hex.r);}
  else{sel=hk(hex.q,hex.r);render();updatePanel();openSheet();}
}

// ═══════════════════════════════════
// BOTTOM SHEET
// ═══════════════════════════════════
const isMob=()=>window.innerWidth<=720;

function openSheet(){
  if(!isMob())return;
  document.getElementById('inspector').classList.add('open');
}
function closeSheet(){
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('inspector').style.transform='';
}
function dismissSheet(){
  sel=null; closeSheet(); render(); updatePanel();
}

// Drag handle
(()=>{
  const handle=document.getElementById('sheetHandle');
  const insp=document.getElementById('inspector');
  let drag=false,y0=0;
  handle.addEventListener('pointerdown',e=>{
    drag=true;y0=e.clientY;
    handle.setPointerCapture(e.pointerId);
    insp.style.transition='none';
    e.stopPropagation();
  });
  handle.addEventListener('pointermove',e=>{
    if(!drag)return;
    insp.style.transform=`translateY(${Math.max(0,e.clientY-y0)}px)`;
  });
  handle.addEventListener('pointerup',e=>{
    if(!drag)return; drag=false;
    insp.style.transition='';
    if(e.clientY-y0>70)dismissSheet();
    else insp.style.transform='';
  });
  handle.addEventListener('pointercancel',()=>{
    drag=false;insp.style.transition='';insp.style.transform='';
  });
})();

window.addEventListener('resize',()=>{
  if(!isMob())closeSheet();
  else if(sel)openSheet();
});

// ═══════════════════════════════════
// MOBILE MENU
// ═══════════════════════════════════
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}
function closeMenu(){document.getElementById('mobileMenu').classList.remove('open');}

// ═══════════════════════════════════
// MODAL
// ═══════════════════════════════════
function showModal(title,bodyHtml,buttons){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  const a=document.getElementById('modalActs');a.innerHTML='';
  buttons.forEach(b=>{
    const btn=document.createElement('button');
    btn.className='abtn '+b.cls;btn.textContent=b.lbl;
    btn.onclick=()=>{if(b.fn)b.fn();hideModal();};
    a.appendChild(btn);
  });
  document.getElementById('overlay').classList.add('show');
}
function hideModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))hideModal();
});

// ═══════════════════════════════════
// FLASH
// ═══════════════════════════════════
function flash(msg){
  const el=document.getElementById('flash');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(flash._t);flash._t=setTimeout(()=>el.style.opacity='0',2200);
}

// ═══════════════════════════════════
// UTIL + KEYBOARD
// ═══════════════════════════════════
function esc(s){
  return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveMap();}
  if(e.key==='Delete'||e.key==='Backspace'){if(sel)delSel();}
  if(e.key==='Escape'){
    if(document.getElementById('overlay').classList.contains('show')){hideModal();return;}
    if(document.getElementById('mobileMenu').classList.contains('open')){closeMenu();return;}
    sel=null;render();updatePanel();closeSheet();
  }
});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
hexes[hk(0,0)]=mkHex(0,0,true);
nb(0,0).forEach(([q,r])=>{hexes[hk(q,r)]=mkHex(q,r,false);});
centerMap();
render();
updatePanel();
</script>
